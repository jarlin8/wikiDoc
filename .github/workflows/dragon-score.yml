name: Dragon Tiger Score

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Python script wencai"]
    types: [completed]

jobs:
  analyze:
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout wencai branch
        uses: actions/checkout@v5
        with:
          ref: wencai
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas tabulate websockets

      - name: Run dragon score
        working-directory: docs
        run: python dragon_score.py

      - name: Send to WeCom Bot
        env:
          BOT_ID: $${{ secrets.WECOM_BOT_ID }}
          BOT_SECRET: ${{ secrets.WECOM_BOT_SECRET }}
        run: |
          python3 docs/send_wecom.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "update dragon score report [$(date +'%Y-%m-%d')]"
          git push origin wencai
